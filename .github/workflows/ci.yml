name: "CI"

on:
  push:
  pull_request:

jobs:
  ci-linux:
    uses: ./.github/workflows/ci-unix.yml
    with:
      runner: ubuntu-latest
      triple: x86_64-linux
    secrets: inherit

  ci-macos-x86:
    uses: ./.github/workflows/ci-unix.yml
    with:
      runner: macos-latest
      triple: x86_64-darwin
    secrets: inherit

